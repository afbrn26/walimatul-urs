<!doctype html>
<html lang="en">
    
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Walimatul 'Urs Destya & Yoyok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rouge+Script&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="style.css">

  </head>
  <body>

    <section id="hero" class="hero w-100 h-100 p-3 mx-auto text-center d-flex justify-content-center align-items-center">
        <main>
            <h1>Destya & Yoyok</h1>
            <h4>Kepada Bapak/Ibu/Saudara/i</h4>
            <p>Nama Yang Diundang</p>
            <a href="#undangan" class="btn btn-lg">Buka Undangan</a>
        </main>
    </section>

    <script>
      // Fungsi untuk mendapatkan parameter dari URL
      function getQueryParameter(name) {
          const urlParams = new URLSearchParams(window.location.search);
          return urlParams.get(name);
      }

      // Ambil nama dari parameter to
      const guestName = getQueryParameter('to');

      // Ganti teks "Nama yang diundang" dengan nama dari URL
      if (guestName) {
          const guestElement = document.querySelector('.hero p');
          guestElement.textContent = guestName.replace(/\+/g, ' '); // Ganti '+' dengan spasi
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
